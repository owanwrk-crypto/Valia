<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valia Pro - Cotizador</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #00f2ff;
            --bg-dark: #0f172a;
            --glass: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: white;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: var(--glass);
            padding: 20px 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%;
            display: flex;
            align-items: center; justify-content: center;
            font-weight: bold;
        }

        .app-screen {
            background: var(--glass);
            padding: 40px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            min-height: 400px;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            transition: 0.3s;
            border-radius: 10px;
        }

        .tab-btn.active {
            color: var(--accent);
            background: rgba(0, 242, 255, 0.1);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logout-btn {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.2);
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 68, 68, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">
                <h2 style="font-family: 'Space Grotesk';">Valia Pro</h2>
            </div>
            <div class="user-info">
                <span id="userNameDisplay">Cargando...</span>
                <div class="user-avatar" id="userInitial">U</div>
                <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
            </div>
        </header>

        <main id="app-screen" class="app-screen">
            <nav class="nav-tabs">
                <button class="tab-btn active" onclick="switchTab('tab-materiales')">Materiales</button>
                <button class="tab-btn" onclick="switchTab('tab-cotizaciones')">Cotizaciones</button>
                <button class="tab-btn" onclick="switchTab('tab-config')">Configuración</button>
            </nav>

            <div id="tab-materiales" class="tab-content active">
                <h3>Gestión de Materiales</h3>
                <p>Aquí se cargarán los materiales desde Supabase.</p>
                <!-- El contenido se cargará dinámicamente -->
            </div>

            <div id="tab-cotizaciones" class="tab-content">
                <h3>Historial de Cotizaciones</h3>
                <p>Lista de cotizaciones realizadas.</p>
            </div>

            <div id="tab-config" class="tab-content">
                <h3>Configuración del Sistema</h3>
                <p>Ajustes generales de la cuenta.</p>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        // Verificación de sesión al cargar
        document.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem('valia_user');
            if (!userStr) {
                window.location.href = 'index.html';
                return;
            }
            const user = JSON.parse(userStr);
            document.getElementById('userNameDisplay').innerText = `Hola, ${user.nombre}`;
            document.getElementById('userInitial').innerText = user.nombre.charAt(0).toUpperCase();
            
            // Mock de cargarMateriales si no está definido en app.js
            if (typeof cargarMateriales !== 'function') {
                window.cargarMateriales = function() {
                    console.log("Mock: Cargando materiales...");
                };
            }
            cargarMateriales();
        });

        function logout() {
            localStorage.removeItem('valia_user');
            window.location.href = 'index.html';
        }

        // Si app.js no tiene switchTab, lo definimos aquí por seguridad
        if (typeof switchTab !== 'function') {
            window.switchTab = function(tabId) {
                document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
                event.currentTarget.classList.add('active');
            };
        }
    </script>
</body>
</html>
