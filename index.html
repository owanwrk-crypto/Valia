<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valia Pro - Acceso</title>
    
    <!-- Fuentes Modernas -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --accent: #00f2ff;
            --bg-dark: #0f172a;
            --glass: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Fondo Animado "Épico" */
        .background-blobs {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
        }

        .blob {
            position: absolute;
            width: 500px; height: 500px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        .blob-1 { top: -100px; left: -100px; }
        .blob-2 { bottom: -100px; right: -100px; animation-delay: -5s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.2); }
        }

        /* Card de Login Glassmorphism */
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 50px 40px;
            width: 400px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 16px;
            display: inline-flex;
            align-items: center; justify-content: center;
            color: white;
            font-size: 2rem;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
            margin-bottom: 15px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            color: white;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        /* Formulario Limpio */
        .form-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper svg {
            position: absolute;
            left: 16px;
            color: rgba(255, 255, 255, 0.3);
            transition: 0.3s;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 14px 16px 14px 48px;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        input:focus + svg {
            color: var(--primary);
        }

        /* Botón de Login "Épico" */
        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
            filter: brightness(1.1);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Estilo para errores */
        .error-message {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="login-card">
        <div class="logo-container">
            <div class="logo-icon">V</div>
            <h1>Valia Pro</h1>
            <p>Accede a tu panel de control</p>
        </div>

        <div class="form-group">
            <label for="userInput">Usuario</label>
            <div class="input-wrapper">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <input type="text" id="userInput" placeholder="Ej: Admin" autocomplete="off" onkeyup="if(event.key === 'Enter') document.getElementById('pinInput').focus()">
            </div>
        </div>

        <div class="form-group">
            <label for="pinInput">PIN de Acceso</label>
            <div class="input-wrapper">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input type="password" id="pinInput" placeholder="••••" maxlength="4" autocomplete="off" inputmode="numeric" onkeyup="if(event.key === 'Enter') validaEntradaUnificada()">
            </div>
        </div>

        <button id="loginBtn" class="btn-login" onclick="validaEntradaUnificada()">Entrar</button>
        <div id="errorMsg" class="error-message"></div>
    </div>

<script>
    const URL_VALIA = "https://ietudbyosupknisbfhlj.supabase.co"; 
    const KEY_VALIA = "sb_publishable_wzDzxlSwdpKw4ok4J1qPPA_1eabsV4P";
    const _sb = supabase.createClient(URL_VALIA, KEY_VALIA);

    function showError(msg) {
        const errorEl = document.getElementById('errorMsg');
        errorEl.innerText = msg;
        errorEl.style.display = 'block';
        setTimeout(() => { errorEl.style.display = 'none'; }, 3000);
    }

    async function validaEntradaUnificada() {
        const userT = document.getElementById('userInput').value.trim();
        const pinT = document.getElementById('pinInput').value.trim();
        const loginBtn = document.getElementById('loginBtn');

        if(!userT || pinT.length < 4) {
            showError("⚠️ Usuario o PIN incompleto");
            return;
        }

        loginBtn.disabled = true;
        loginBtn.innerText = "Verificando...";

        console.log("Intentando login con usuario:", userT);

        try {
            // Intentamos buscar por 'nombre'. 
            // Si el usuario dice que tiene id-1 nombre-admin-pin-1234, 
            // tal vez el nombre de la columna es 'nombre' o 'nombre-admin'? 
            // Vamos a intentar con 'nombre' primero.
            let { data, error } = await _sb
                .from('usuarios')
                .select('*')
                .ilike('nombre', userT)
                .maybeSingle(); // maybeSingle no da error si no encuentra nada

            if (error) {
                console.error("Error de Supabase:", error);
                showError("❌ Error DB: " + error.message);
                loginBtn.disabled = false;
                loginBtn.innerText = "Entrar";
                return;
            }

            // Si no encontró nada por 'nombre', intentamos buscar por 'usuario' 
            // solo como respaldo por si el nombre de la columna es ese.
            if (!data) {
                const altSearch = await _sb
                    .from('usuarios')
                    .select('*')
                    .ilike('usuario', userT)
                    .maybeSingle();
                
                if (altSearch.data) {
                    data = altSearch.data;
                }
            }

            if (!data) {
                showError("❌ Usuario '" + userT + "' no encontrado en la tabla 'usuarios'");
                loginBtn.disabled = false;
                loginBtn.innerText = "Entrar";
                return;
            }

            if (data) {
                console.log("Usuario encontrado:", data);
                
                // Comparamos el PIN. Importante: convertimos ambos a String por si en la DB es número
                if (String(data.pin) === String(pinT)) {
                    loginBtn.innerText = "¡Bienvenido!";
                    loginBtn.style.background = "linear-gradient(135deg, #10b981, #34d399)";
                    localStorage.setItem('valia_user', JSON.stringify({id: data.id, nombre: data.nombre}));
                    
                    setTimeout(() => {
                        window.location.href = 'cotizador.html'; 
                    }, 600);
                } else {
                    showError("❌ PIN Incorrecto para " + data.nombre);
                    document.getElementById('pinInput').value = "";
                    loginBtn.disabled = false;
                    loginBtn.innerText = "Entrar";
                }
            }
        } catch (e) {
            console.error("Error crítico:", e);
            showError("❌ Error de conexión");
            loginBtn.disabled = false;
            loginBtn.innerText = "Entrar";
        }
    }
</script>

</body>
</html>
