<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valia - Acceso Privado</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #00f2ff; --bg: #020a16; }
        body {
            background: radial-gradient(circle, #0b2a55, #020a16);
            color: white; font-family: 'Rajdhani', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .login-card {
            background: rgba(10, 25, 47, 0.8);
            padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; backdrop-filter: blur(10px); width: 300px;
        }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--accent); font-size: 1.5rem; margin-bottom: 20px; }
        .pin-display {
            background: rgba(0,0,0,0.3); border: 2px solid var(--accent);
            border-radius: 10px; padding: 15px; font-size: 2rem;
            letter-spacing: 10px; margin-bottom: 20px; height: 40px;
        }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .key {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 20px; border-radius: 10px; font-size: 1.2rem;
            cursor: pointer; transition: 0.2s; font-family: 'Orbitron';
        }
        .key:hover { background: var(--accent); color: var(--bg); box-shadow: 0 0 15px var(--accent); }
        .key.clear { color: #ff4444; }
    </style>
</head>
<body>

<div class="login-card">
    <h1>VALIA AUTH</h1>
    <div class="pin-display" id="display">****</div>
    <div class="keypad">
        <button class="key" onclick="press(1)">1</button>
        <button class="key" onclick="press(2)">2</button>
        <button class="key" onclick="press(3)">3</button>
        <button class="key" onclick="press(4)">4</button>
        <button class="key" onclick="press(5)">5</button>
        <button class="key" onclick="press(6)">6</button>
        <button class="key" onclick="press(7)">7</button>
        <button class="key" onclick="press(8)">8</button>
        <button class="key" onclick="press(9)">9</button>
        <button class="key clear" onclick="clearPin()">C</button>
        <button class="key" onclick="press(0)">0</button>
        <button class="key" style="color:var(--accent)" onclick="login()">OK</button>
    </div>
</div>

<script>
    const URL_SB = "https://ietudbyosupknisbfhlj.supabase.co"; 
    const KEY_SB = "sb_publishable_wzDzxlSwdpKw4ok4J1qPPA_1eabsV4P";
    const _sb = supabase.createClient(URL_SB, KEY_SB);

    let currentPin = "";

    function press(n) {
        if(currentPin.length < 4) {
            currentPin += n;
            updateDisplay();
        }
    }

    function clearPin() { currentPin = ""; updateDisplay(); }

    function updateDisplay() {
        document.getElementById('display').innerText = "*".repeat(currentPin.length) || "****";
    }

    async function login() {
        if(currentPin.length < 4) return;

        const { data, error } = await _sb
            .from('usuarios')
            .select('*')
            .eq('pin', currentPin)
            .single();

        if (data) {
            localStorage.setItem('valia_token', 'session_active');
            window.location.href = 'cotizador.html'; // Nombre de tu página principal
        } else {
            alert("PIN INCORRECTO");
            clearPin();
        }
    }
</script>
</body>
</html>
