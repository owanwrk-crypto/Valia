<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valia - Cotizador Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header class="animate-in">
        <h1>VALIA // CONTROL DE COSTOS</h1>
        <p id="fecha-actual"></p>
    </header>

    <div class="layout">
        <div class="left-panel animate-in">
            <div class="card glass-card">
                <div class="section-title"><i class="fas fa-plus-circle"></i> AGREGAR CONCEPTO</div>
                <div class="flex-row">
                    <div class="form-group" style="max-width: 150px;">
                        <label>Categoría</label>
                        <select id="tipoItem" onchange="actualizarInterfaz()">
                            <option value="material">📦 Material</option>
                            <option value="servicio">🛠 Servicio</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label id="labelItem">Seleccionar Item</label>
                        <select id="selectItem"></select>
                    </div>
                    <div class="form-group" style="max-width: 100px;">
                        <label id="labelCant">Cantidad</label>
                        <input type="number" id="cantidadItem" value="1" min="0.1" step="0.1">
                    </div>
                    <button class="btn-neon" onclick="agregarItemALista()">Añadir</button>
                </div>
            </div>

            <div class="card glass-card">
                <div class="section-title"><i class="fas fa-file-invoice-dollar"></i> RESUMEN</div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Concepto</th>
                                <th>Cant.</th>
                                <th>P. Unit.</th>
                                <th>Subtotal</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="listaCotizacion"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="right-panel animate-in">
            <div class="card total-card">
                <div class="section-title" style="justify-content:center;">RESULTADO FINAL</div>
                <div class="form-group" style="margin: 20px 0;">
                    <label>Margen de Utilidad (%)</label>
                    <input type="number" id="margen" value="30" onchange="calcularFinal()">
                </div>
                <div class="total-label">PRECIO DE VENTA</div>
                <div class="total-value" id="displayTotal">$0.00</div>
                <button class="btn-export" onclick="generarPDF()">
                    <i class="fas fa-download"></i> EXPORTAR PDF
                </button>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
