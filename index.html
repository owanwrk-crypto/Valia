<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valia Pro - Sistema Unificado</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="login-screen" class="view">
        <div class="login-card">
            <h1>VALIA SYSTEM</h1>
            <div class="input-group">
                <label>Usuario</label>
                <input type="text" id="userInput" placeholder="Nombre" autocomplete="off">
            </div>
            <label>PIN DE ACCESO</label>
            <div class="pin-display" id="pinView">****</div>
            <div class="keypad">
                <button class="key" onclick="addPin(1)">1</button>
                <button class="key" onclick="addPin(2)">2</button>
                <button class="key" onclick="addPin(3)">3</button>
                <button class="key" onclick="addPin(4)">4</button>
                <button class="key" onclick="addPin(5)">5</button>
                <button class="key" onclick="addPin(6)">6</button>
                <button class="key" onclick="addPin(7)">7</button>
                <button class="key" onclick="addPin(8)">8</button>
                <button class="key" onclick="addPin(9)">9</button>
                <button class="key" style="color:#ff4444" onclick="clearPin()">C</button>
                <button class="key" onclick="addPin(0)">0</button>
                <button class="btn-login" onclick="intentarLogin()">ENTRAR</button>
            </div>
        </div>
    </section>

    <section id="app-screen" class="view" style="display: none;">
        <div class="header">
            <div>
                <h1>VALIA PRO</h1>
                <p id="userNameDisplay">Bienvenido</p>
            </div>
            <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        </div>

        <nav class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('tab-cotizador')">Cotizador</button>
            <button class="tab-btn" onclick="switchTab('tab-inventario')">Inventario</button>
        </nav>

        <div id="tab-cotizador" class="tab-content active">
            <div class="layout">
                <div class="left-panel">
                    <div class="card flex-row">
                        <div class="form-group">
                            <label>Tipo</label>
                            <select id="tipoItem" onchange="actualizarInterfaz()"></select>
                        </div>
                        <div class="form-group">
                            <label>Item</label>
                            <select id="selectItem"></select>
                        </div>
                        <div class="form-group" style="max-width: 80px;">
                            <label>Cant.</label>
                            <input type="number" id="cantidadItem" value="1">
                        </div>
                        <button class="btn-add" onclick="agregarAlPresupuesto()">Añadir</button>
                    </div>
                    <div class="card">
                        <table id="tablaCotizacion">
                            <thead>
                                <tr><th>Concepto</th><th>Cant.</th><th>P. Unit</th><th>Total</th><th></th></tr>
                            </thead>
                            <tbody id="listaCotizacion"></tbody>
                        </table>
                    </div>
                </div>
                <div class="right-panel">
                    <div class="card total-box">
                        <label>Margen (%)</label>
                        <input type="number" id="margen" value="30" onchange="calcularFinal()">
                        <div class="total-val" id="displayTotal">$0.00</div>
                        <button class="btn-export" onclick="generarPDF()">EXPORTAR PDF</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-inventario" class="tab-content">
            <div class="card">
                <h2>Gestión de Inventario</h2>
                <p>Aquí podrás dar de alta tus materiales pronto...</p>
            </div>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
