<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valia Pro - Acceso</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --accent: #00f2ff; /* Cian Neón */
            --bg-deep: #020a16;
            --gradient-start: #ff00ff; /* Magenta */
            --gradient-end: #00f2ff; /* Cian */
            --glass: rgba(10, 25, 47, 0.7);
            --font-main: 'Rajdhani', sans-serif;
            --font-header: 'Orbitron', sans-serif;
        }

        body {
            font-family: var(--font-main);
            /* Degradado de fondo con más profundidad */
            background: linear-gradient(135deg, #4f3aff 0%, #0c0068 50%, #b100ff 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Contenedor Orgánico del Login (como la imagen) */
        .login-card {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            /* Forma orgánica usando border-radius complejo */
            border-radius: 40% 60% 50% 50% / 60% 40% 60% 40%;
            padding: 60px 40px;
            width: 350px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            animation: formAppear 0.5s ease-out;
        }

        /* Efecto de Luz de Fondo (Gradient Blobs) */
        .login-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; width: 100%; height: 100%;
            border-radius: 40% 60% 50% 50% / 60% 40% 60% 40%;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            z-index: -1;
            filter: blur(5px);
            opacity: 0.5;
        }

        /* Avatar de Usuario (Círculo blanco como la imagen) */
        .avatar {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px auto;
            position: relative;
        }
        
        /* Icono de usuario dentro del avatar con degradado */
        .avatar-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border-radius: 50%;
            clip-path: circle(50% at 50% 50%); /* Opcional: para asegurar forma */
        }

        /* Cabecera "Sign In" */
        h1 {
            font-family: var(--font-header);
            color: white;
            font-size: 2.2rem;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* Grupo de Input y PIN Display unificado */
        .input-pin-container {
            margin-bottom: 25px;
            text-align: left;
        }

        /* Input de Usuario (con icono integrado) */
        .input-user-group {
            position: relative;
            margin-bottom: 15px;
        }

        .user-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.7);
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 15px 15px 45px; /* Espacio para icono */
            border-radius: 30px; /* Bordes muy redondeados */
            color: white;
            font-family: var(--font-header);
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        
        input:focus {
            border-color: var(--gradient-end);
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 10px rgba(0,242,255,0.3);
        }

        /* Visualizador de PIN (Estilo modernizado como input) */
        .input-pin-group {
            position: relative;
            margin-bottom: 15px;
        }

        .pin-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.7);
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 15px 15px 45px; /* Espacio para icono */
            border-radius: 30px; /* Bordes muy redondeados */
            color: white;
            font-family: var(--font-header);
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        
        input:focus {
            border-color: var(--gradient-end);
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 15px rgba(0,242,255,0.4);
        }

        input::placeholder {
            color: rgba(255,255,255,0.4);
            font-family: var(--font-main);
        }

        /* Botón de Login (Degradado como la imagen) */
        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: var(--bg-deep);
            border: none;
            padding: 18px;
            border-radius: 30px;
            font-family: var(--font-header);
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,242,255,0.4);
        }

        /* Animación de entrada */
        @keyframes formAppear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

<div class="login-card">
    <div class="avatar">
        <div class="avatar-icon"></div>
    </div>
    
    <h1>Sign In</h1>
    
    <div class="input-pin-container">
        <div class="input-user-group">
            <svg class="user-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
            <input type="text" id="userInput" placeholder="Nombre de Usuario" autocomplete="off" onkeyup="if(event.key === 'Enter') document.getElementById('pinInput').focus()">
        </div>
        
        <div class="input-pin-group">
            <svg class="pin-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
            </svg>
            <input type="password" id="pinInput" placeholder="PIN de 4 dígitos" maxlength="4" autocomplete="off" inputmode="numeric" onkeyup="if(event.key === 'Enter') validaEntradaUnificada()">
        </div>
    </div>
    
    <button id="loginBtn" class="btn-login" onclick="validaEntradaUnificada()">LOG IN</button>
</div>

<script>
    // Credenciales unificadas (Tus claves reales)
    const URL_VALIA = "https://ietudbyosupknisbfhlj.supabase.co"; 
    const KEY_VALIA = "sb_publishable_wzDzxlSwdpKw4ok4J1qPPA_1eabsV4P";
    const _sb = supabase.createClient(URL_VALIA, KEY_VALIA);

    async function validaEntradaUnificada() {
        const userT = document.getElementById('userInput').value.trim();
        const pinT = document.getElementById('pinInput').value.trim();
        const loginBtn = document.getElementById('loginBtn');

        if(!userT || pinT.length < 4) {
            alert("⚠️ Por favor, ingresa usuario y PIN completo (4 dígitos).");
            return;
        }

        // Estado visual de carga
        loginBtn.disabled = true;
        loginBtn.innerText = "VERIFICANDO...";
        loginBtn.style.opacity = "0.7";

        console.log("Validando acceso para:", userT);

        try {
            // Primero buscamos el usuario para ver si existe (esto nos ayuda a depurar)
            // Usamos .ilike para que no importe mayúsculas/minúsculas en el nombre
            const { data, error } = await _sb
                .from('usuarios')
                .select('*')
                .ilike('nombre', userT)
                .single();

            if (error) {
                console.error("Error al buscar usuario:", error.message);
                alert("❌ USUARIO NO ENCONTRADO");
                loginBtn.disabled = false;
                loginBtn.innerText = "LOG IN";
                loginBtn.style.opacity = "1";
                return;
            }

            if (data) {
                // Si el usuario existe, verificamos el PIN manualmente en JS 
                // para evitar problemas de tipos de datos en la consulta (string vs number)
                // OJO: data.pin puede ser string o number dependiendo de tu DB
                if (String(data.pin) === String(pinT)) {
                    console.log("Acceso correcto para:", data.nombre);
                    localStorage.setItem('valia_user', JSON.stringify({id: data.id, nombre: data.nombre}));
                    
                    // Pequeña animación antes de redirigir
                    loginBtn.innerText = "¡BIENVENIDO!";
                    loginBtn.style.background = "linear-gradient(135deg, #00ff88, #00f2ff)";
                    
                    setTimeout(() => {
                        window.location.href = 'cotizador.html'; 
                    }, 500);
                } else {
                    console.error("PIN incorrecto");
                    alert("❌ PIN INCORRECTO");
                    document.getElementById('pinInput').value = "";
                    loginBtn.disabled = false;
                    loginBtn.innerText = "LOG IN";
                    loginBtn.style.opacity = "1";
                }
            }
        } catch (e) {
            console.error("Error inesperado:", e);
            alert("❌ ERROR DE CONEXIÓN");
            loginBtn.disabled = false;
            loginBtn.innerText = "LOG IN";
            loginBtn.style.opacity = "1";
        }
    }
</script>

</body>
</html>
